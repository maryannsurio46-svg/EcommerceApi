<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
        }

        .container {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            background: #ddd;
            font-weight: bold;
        }

        .tabs button.active {
            background: #007bff;
            color: white;
        }

        form {
            display: none;
        }

        form.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button.submit-btn:hover {
            background: #0056b3;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .dashboard {
            display: none;
            text-align: center;
        }

        .dashboard button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: crimson;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .orders {
            margin-top: 20px;
            text-align: left;
            background: #f8f8f8;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LOGIN / REGISTER -->
    <div id="authSection">

        <div class="tabs">
            <button id="loginTab" class="active">Login</button>
            <button id="registerTab">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="active">
            <input type="text" id="loginUsername"
                   placeholder="Username" required>

            <input type="password" id="loginPassword"
                   placeholder="Password" required>

            <button type="submit" class="submit-btn">
                Login
            </button>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm">
            <input type="text" id="registerUsername"
                   placeholder="Username" required>

            <input type="password" id="registerPassword"
                   placeholder="Password" required>

            <button type="submit" class="submit-btn">
                Register
            </button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">

        <h2>Dashboard</h2>

        <p>User authenticated successfully.</p>

        <button id="loadOrdersBtn">
            Load Protected Orders
        </button>

        <div class="orders" id="orders"></div>

        <button id="logoutBtn">Logout</button>
    </div>
</div>

<script>
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    const message = document.getElementById("message");

    const authSection = document.getElementById("authSection");
    const dashboard = document.getElementById("dashboard");

    // SWITCH TABS
    loginTab.addEventListener("click", () => {
        loginTab.classList.add("active");
        registerTab.classList.remove("active");

        loginForm.classList.add("active");
        registerForm.classList.remove("active");

        message.innerHTML = "";
    });

    registerTab.addEventListener("click", () => {
        registerTab.classList.add("active");
        loginTab.classList.remove("active");

        registerForm.classList.add("active");
        loginForm.classList.remove("active");

        message.innerHTML = "";
    });

    // REGISTER
    registerForm.addEventListener("submit", async (e) => {

        e.preventDefault();

        const user = {
            username:
                document.getElementById("registerUsername").value,

            password:
                document.getElementById("registerPassword").value
        };

        try {

            const response = await fetch(
                "http://localhost:8080/api/auth/register",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(user)
                }
            );

            if (response.ok) {

                message.innerHTML =
                    "Registration successful!";

                message.className =
                    "message success";

            } else {

                const error = await response.text();

                message.innerHTML =
                    "Registration failed: " + error;

                message.className =
                    "message error";
            }

        } catch (err) {

            message.innerHTML =
                "Server connection failed.";

            message.className =
                "message error";
        }
    });

    // LOGIN
    loginForm.addEventListener("submit", async (e) => {

        e.preventDefault();

        const username =
            document.getElementById("loginUsername").value;

        const password =
            document.getElementById("loginPassword").value;

        try {

            const response = await fetch(
                "http://localhost:8080/login",
                {
                    method: "POST",

                    // IMPORTANT FOR SESSION COOKIE
                    credentials: "include",

                    headers: {
                        "Content-Type":
                            "application/x-www-form-urlencoded"
                    },

                    body: new URLSearchParams({
                        username: username,
                        password: password
                    })
                }
            );

            if (response.ok) {

                message.innerHTML =
                    "Login successful!";

                message.className =
                    "message success";

                authSection.style.display = "none";
                dashboard.style.display = "block";

            } else {

                message.innerHTML =
                    "Invalid username or password.";

                message.className =
                    "message error";
            }

        } catch (err) {

            message.innerHTML =
                "Server connection failed.";

            message.className =
                "message error";
        }
    });

    // LOAD PROTECTED DATA
    document.getElementById("loadOrdersBtn")
        .addEventListener("click", async () => {

        const ordersDiv =
            document.getElementById("orders");

        try {

            const response = await fetch(
                "http://localhost:8080/api/v1/orders",
                {
                    method: "GET",

                    // SEND SESSION COOKIE
                    credentials: "include"
                }
            );

            if (response.status === 401) {

                ordersDiv.innerHTML =
                    "401 Unauthorized";

                return;
            }

            const data = await response.json();

            ordersDiv.innerHTML =
                "<pre>" +
                JSON.stringify(data, null, 2) +
                "</pre>";

        } catch (err) {

            ordersDiv.innerHTML =
                "Failed to load protected data.";
        }
    });

    // LOGOUT
    document.getElementById("logoutBtn")
        .addEventListener("click", async () => {

        await fetch(
            "http://localhost:8080/logout",
            {
                method: "POST",
                credentials: "include"
            }
        );

        dashboard.style.display = "none";
        authSection.style.display = "block";

        message.innerHTML = "Logged out.";
        message.className = "message success";
    });
</script>

</body>
</html>
